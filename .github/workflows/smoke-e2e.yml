name: Smoke E2E (golden scenarios)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke E2E suite
        run: npx vitest run tests/e2e-smoke/golden-smoke.test.mjs

      - name: Run token-budget validator suite
        run: npx vitest run tests/token-budget.test.mjs
